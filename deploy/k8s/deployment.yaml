apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-spectra
  namespace: fusion
  labels:
    app: fusion-spectra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fusion-spectra
  template:
    metadata:
      labels:
        app: fusion-spectra
    spec:
      containers:
        - name: spectra
          image: fusion-spectra:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
