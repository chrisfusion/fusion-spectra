server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to fusion-forge via Kubernetes service hostname
    location /api/v1/ {
        proxy_pass         http://fusion-forge.fusion.svc.cluster.local:8080/api/v1/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SPA fallback + serve MFE assets with CORS so the shell host can load remoteEntry.js
    location / {
        add_header Access-Control-Allow-Origin *;
        try_files $uri $uri/ /index.html;
    }
}
