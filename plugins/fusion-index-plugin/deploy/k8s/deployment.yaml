apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-index-plugin
  namespace: fusion
  labels:
    app: fusion-index-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fusion-index-plugin
  template:
    metadata:
      labels:
        app: fusion-index-plugin
    spec:
      containers:
        - name: plugin
          image: fusion-index-plugin:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
