apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-ui-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-spectra.labels" . | nindent 4 }}
data:
  config.js: |
    window.FUSION_CONFIG = {
      authMode:       {{ .Values.ui.authMode       | quote }},
      oidcAuthority:  {{ .Values.ui.oidcAuthority  | quote }},
      oidcClientId:   {{ .Values.ui.oidcClientId   | quote }},
      {{- if .Values.ui.oidcRedirectUri }}
      oidcRedirectUri: {{ .Values.ui.oidcRedirectUri | quote }},
      {{- end }}
      {{- if .Values.ui.devToken }}
      devToken: {{ .Values.ui.devToken | quote }},
      {{- end }}
      {{- if and .Values.plugins.indexPlugin.enabled .Values.plugins.indexPlugin.baseUrl }}
      indexBaseUrl: {{ .Values.plugins.indexPlugin.baseUrl | quote }},
      {{- end }}
      {{- if and .Values.plugins.forgePlugin.enabled .Values.plugins.forgePlugin.baseUrl }}
      forgeBaseUrl: {{ .Values.plugins.forgePlugin.baseUrl | quote }},
      {{- end }}
    };
