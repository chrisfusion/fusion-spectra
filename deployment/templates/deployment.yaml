apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-spectra
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-spectra.labels" . | nindent 4 }}
    app: fusion-spectra
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: fusion-spectra
  template:
    metadata:
      labels:
        app: fusion-spectra
        {{- include "fusion-spectra.labels" . | nindent 8 }}
      annotations:
        # Force pod restart when the ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: spectra
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: ui-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
              readOnly: true
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: ui-config
          configMap:
            name: {{ .Release.Name }}-ui-config
