{{- if .Values.plugins.forgePlugin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fusion-forge-plugin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-spectra.labels" . | nindent 4 }}
    app: fusion-forge-plugin
    app.kubernetes.io/component: plugin
spec:
  type: NodePort
  selector:
    app: fusion-forge-plugin
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      nodePort: {{ .Values.plugins.forgePlugin.nodePort }}
{{- end }}
