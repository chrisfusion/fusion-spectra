{{- if .Values.plugins.indexPlugin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-index-plugin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-spectra.labels" . | nindent 4 }}
    app: fusion-index-plugin
    app.kubernetes.io/component: plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fusion-index-plugin
  template:
    metadata:
      labels:
        app: fusion-index-plugin
        {{- include "fusion-spectra.labels" . | nindent 8 }}
    spec:
      containers:
        - name: plugin
          image: "{{ .Values.plugins.indexPlugin.image.repository }}:{{ .Values.plugins.indexPlugin.image.tag }}"
          imagePullPolicy: {{ .Values.plugins.indexPlugin.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.plugins.indexPlugin.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
{{- end }}
