{{- if .Values.plugins.indexPlugin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fusion-index-plugin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-spectra.labels" . | nindent 4 }}
    app: fusion-index-plugin
    app.kubernetes.io/component: plugin
spec:
  type: NodePort
  selector:
    app: fusion-index-plugin
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      nodePort: {{ .Values.plugins.indexPlugin.nodePort }}
{{- end }}
