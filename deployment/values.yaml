# =============================================================================
# fusion-spectra — Helm Values (production defaults)
# =============================================================================

# Kubernetes namespace — must match the fusion platform namespace.
# fusion-spectra owns namespace creation; other charts set createNamespace: false.
namespace: fusion
createNamespace: true

# -----------------------------------------------------------------------------
# UI — nginx serving the pre-built Vue SPA (port 80)
# -----------------------------------------------------------------------------
ui:
  image:
    repository: fusion-spectra
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # ---------------------------------------------------------------------------
  # Runtime configuration — injected as /config.js via ConfigMap mount.
  # These override Vite build-time env vars without requiring an image rebuild.
  # ---------------------------------------------------------------------------

  # authMode: oidc | bypass | token
  authMode: oidc

  # OIDC issuer URL (e.g. https://keycloak.example.com/realms/fusion)
  oidcAuthority: ""

  oidcClientId: fusion-spectra

  # Optional: defaults to <origin>/auth/callback
  oidcRedirectUri: ""

  # Required only when authMode=token — long-lived JWT for dev/staging
  devToken: ""

# -----------------------------------------------------------------------------
# Plugins — optional MFE remotes
#
# Each plugin is an independent Deployment + NodePort Service deployed into the
# same namespace as the shell.  The plugin's nginx proxies /api/v1/ to
# backend services using Kubernetes DNS, so no ingress is required for API
# traffic.
#
# The shell SPA must have been built with the matching VITE_<PLUGIN>_PLUGIN_URL
# env var so that Module Federation resolves the remoteEntry.js at startup.
# -----------------------------------------------------------------------------
plugins:
  indexPlugin:
    # Set to true to deploy fusion-index-plugin alongside the shell.
    enabled: false

    image:
      repository: fusion-index-plugin
      tag: "0.1.0"
      pullPolicy: IfNotPresent

    # NodePort exposed to the browser — must be free in the cluster.
    nodePort: 30083

    # Browser-accessible base URL of this plugin's NodePort service.
    # The plugin's nginx proxies /api/v1/ → index-backend:8080 internally.
    # Example (minikube):  http://<minikube-ip>:30083
    # Leave empty to skip injecting indexBaseUrl into the shell ConfigMap.
    baseUrl: ""

    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  forgePlugin:
    # Set to true to deploy fusion-forge-plugin alongside the shell.
    enabled: false

    image:
      repository: fusion-forge-plugin
      tag: "0.1.0"
      pullPolicy: IfNotPresent

    # NodePort exposed to the browser — must be free in the cluster.
    nodePort: 30084

    # Browser-accessible base URL of this plugin's NodePort service.
    # The plugin's nginx proxies /api/v1/ → fusion-forge:8080 internally.
    # Example (minikube):  http://<minikube-ip>:30084
    # Leave empty to skip injecting forgeBaseUrl into the shell ConfigMap.
    baseUrl: ""

    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: spectra.fusion.local
  annotations: {}
  tls:
    enabled: false
    secretName: fusion-spectra-tls
